<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>羽毛球积分系统</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css">
</head>
<body>
  <nav id="nav">
    <div class="nav-brand">🏸 羽毛球积分系统</div>
    <div class="nav-links">
      <a href="#" data-tab="home">首页</a>
      <a href="#" data-tab="rankings">积分排名</a>
      <a href="#" data-tab="query">赛事查询</a>
      <a href="#" data-tab="player-query">选手查询</a>
      <a href="#" data-tab="headtohead">对阵查询</a>
      <a href="#" data-tab="admin" class="danger-tab">赛事管理</a>
    </div>
  </nav>

  <div id="admin-subnav">
    <a href="#" data-subtab="players" class="active">👤 选手管理</a>
    <a href="#" data-subtab="matches">🏟️ 比赛管理</a>
  </div>

  <div class="container">
    <!-- 首页 -->
    <div id="tab-home" class="tab active">
      <div id="home-content"></div>
    </div>

    <!-- 赛事管理（密码验证在此标签页内） -->
    <div id="tab-admin" class="tab"></div>

    <!-- 选手管理 -->
    <div id="tab-players" class="tab">
      <h2>👤 选手管理</h2>
      <div class="card">
        <h3>添加选手</h3>
        <div class="form-row">
          <input type="text" id="player-name" placeholder="比赛ID">
          <input type="text" id="player-real-name" placeholder="姓名（可选）">
          <select id="player-gender"><option value="">选择性别</option><option value="male">男</option><option value="female">女</option></select>
          <button onclick="addPlayer()">添加</button>
        </div>
      </div>
      <div class="card"><h3>选手列表</h3><div id="player-list"></div></div>
    </div>

    <!-- 比赛管理 -->
    <div id="tab-matches" class="tab">
      <h2>🏟️ 比赛管理</h2>
      <div class="card" id="create-round-card">
        <h3>📋 创建新轮次</h3>
        <div class="form-row">
          <select id="round-tournament"><option value="">选择赛事</option></select>
          <input type="number" id="round-edition" placeholder="输入届数" min="1" value="1">
          <input type="date" id="round-date">
          <select id="round-level">
            <option value="1000">1000级</option>
            <option value="750">750级</option>
            <option value="500">500级</option>
            <option value="300">300级</option>
          </select>
          <button id="save-edition-btn" onclick="saveRoundChanges()" style="display:none">💾 保存</button>
          <span id="save-round-status" style="margin-left:4px;font-size:13px;color:#38a169"></span>
        </div>
        <div id="existing-round-info" style="display:none;margin-bottom:12px;padding:10px 14px;background:#fffbeb;border:1px solid #f6e05e;border-radius:6px;font-size:14px">
          🔔 该赛事此届已有轮次，<a href="#" onclick="loadExistingRound();return false" style="color:#d69e2e;font-weight:600">点击此处加载已有轮次进行比分编辑</a>
        </div>
        <div id="participant-area">
          <div class="form-row">
            <strong style="min-width:60px">参赛者：</strong>
            <select id="participant-select"><option value="">请先选择赛事</option></select>
            <button onclick="addParticipant()">添加</button>
          </div>
          <div id="participant-list"></div>
          <div class="form-row" id="round-actions" style="display:none;margin-top:8px">
            <button onclick="createAndShowFixtures()">⚡ 生成对阵表</button>
          </div>
        </div>
      </div>
      <div class="card" id="fixture-card" style="display:none">
        <h3>🏟️ <span id="fixture-title">对阵表</span></h3>
        <div id="fixture-form"></div>
        <div style="margin-top:12px;text-align:right">
          <button onclick="saveAllMatches()">💾 保存所有比分</button>
          <span id="save-all-status" style="margin-left:8px;font-size:13px"></span>
        </div>
      </div>
      <div class="card" id="live-rank-card" style="display:none">
        <h3>📊 实时排名</h3>
        <div id="live-rankings"></div>
      </div>
      <div class="card" id="free-match-card" style="display:none">
        <h3>🎯 手动录入比赛</h3>
        <div id="fm-round-info">
          <div class="form-row">
            <button onclick="createFreeRound()" id="fm-create-btn">📋 创建轮次</button>
            <span id="fm-round-status" style="margin-left:8px;font-size:13px"></span>
          </div>
        </div>
        <div id="fm-entry-area" style="display:none">
          <div style="margin-bottom:8px">
            <button class="danger" onclick="deleteFreeRound()">🗑️ 删除该轮</button>
            <span id="fm-delete-status" style="margin-left:8px;font-size:13px"></span>
          </div>
          <div class="form-row">
            <select id="fm-p1"><option value="">选手1</option></select>
            <select id="fm-p2"><option value="">选手2</option></select>
            <span style="margin:0 4px">VS</span>
            <select id="fm-p3"><option value="">选手3</option></select>
            <select id="fm-p4"><option value="">选手4</option></select>
          </div>
          <div class="form-row" style="margin-top:6px">
            <input type="number" id="fm-s1" placeholder="比分" min="0" max="31" style="width:60px">
            <span style="margin:0 4px">:</span>
            <input type="number" id="fm-s2" placeholder="比分" min="0" max="31" style="width:60px">
            <button onclick="saveFreeMatch()">✅ 录入</button>
            <span id="fm-status" style="margin-left:8px;font-size:13px"></span>
          </div>
          <div id="free-match-list" style="margin-top:12px"></div>
        </div>
      </div>
    </div>

    <!-- 积分排名 -->
    <div id="tab-rankings" class="tab">
      <h2>🏆 积分排名</h2>
      <div id="rankings-content"><div class="loading">加载中...</div></div>
    </div>

    <!-- 赛事查询 -->
    <div id="tab-query" class="tab">
      <h2>🔎 赛事查询</h2>
      <div class="card">
        <div class="form-row">
          <select id="query-tournament"><option value="">全部赛事</option></select>
          <input type="number" id="query-edition" placeholder="届数（可选）" min="1">
          <button onclick="queryRounds()">查询</button>
        </div>
      </div>
      <div id="query-results"></div>
    </div>

    <!-- 选手查询 -->
    <div id="tab-player-query" class="tab">
      <h2>🔍 选手查询</h2>
      <div class="card">
        <div class="form-row">
          <input type="text" id="query-player-name" placeholder="输入比赛ID或姓名" onkeydown="if(event.key==='Enter')queryPlayer()">
          <button onclick="queryPlayer()">查询</button>
        </div>
      </div>
      <div id="player-result"></div>
    </div>

    <!-- 对阵查询 -->
    <div id="tab-headtohead" class="tab">
      <h2>⚔️ 对阵查询</h2>
      <div class="card">
        <div class="form-row">
          <input type="text" id="h2h-name1" placeholder="选手A姓名">
          <input type="text" id="h2h-name2" placeholder="选手B姓名">
          <button onclick="queryHeadToHead()">查询</button>
        </div>
      </div>
      <div id="h2h-result"></div>
    </div>
  </div>

  <div id="crop-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:1000;align-items:center;justify-content:center">
    <div style="background:white;border-radius:12px;padding:24px;max-width:90vw;max-height:90vh;display:flex;flex-direction:column">
      <h3 style="margin-bottom:12px">✂️ 裁剪头像</h3>
      <div id="crop-container" style="max-width:600px;max-height:60vh;overflow:hidden">
        <img id="crop-image" src="">
      </div>
      <div style="margin-top:12px;display:flex;gap:8px;justify-content:flex-end">
        <button class="secondary" onclick="closeCropModal()">取消</button>
        <button onclick="confirmCrop()">✅ 确认上传</button>
      </div>
    </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
  <script src="/app.js?v=2"></script>
</body>
</html>
